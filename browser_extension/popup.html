<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px;
      border-radius: 6px;
      background: #f5f5f5;
    }
    .status.connected {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status.disconnected {
      background: #ffebee;
      color: #c62828;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9e9e9e;
    }
    .connected .dot {
      background: #4caf50;
    }
    .disconnected .dot {
      background: #f44336;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      color: white;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #4f46e5;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .message {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
    }
    .message.success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .message.error {
      background: #ffebee;
      color: #c62828;
    }
    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>📚 Claude Cards</h1>

  <div id="status" class="status">
    <span class="dot"></span>
    <span id="status-text">Checking...</span>
  </div>

  <button id="create-btn" disabled>Create Flashcard from Selection</button>

  <div id="message" class="message" style="display: none;"></div>

  <p class="hint">
    Tip: Select text on any page, then click the button or right-click and choose "Create Flashcard"
  </p>

  <script src="popup.js"></script>
</body>
</html>
